{{- $prefix := include "parasol-insurance-tenant.prefix" . -}}
{{- range $ns := list "build" "dev" "prod" }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: {{ $prefix }}-{{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  limits:
  - type: Container
    default:
      cpu: {{ $.Values.limitRange.default.cpu | quote }}
      memory: {{ $.Values.limitRange.default.memory | quote }}
    defaultRequest:
      cpu: {{ $.Values.limitRange.defaultRequest.cpu | quote }}
      memory: {{ $.Values.limitRange.defaultRequest.memory | quote }}
{{- end }}
